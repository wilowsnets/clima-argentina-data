name: Actualizar Clima Argentina

on:
  schedule:
    - cron: '*/30 * * * *' # Ejecuta cada 30 minutos
  workflow_dispatch: # Permite ejecución manual

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Ejecutar script de actualización
      run: node update-weather.js

    - name: Commit y Push de los cambios
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add clima-argentina.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Automated weather update [skip ci]"
        git push origin main
